<script>
  let currentActiveVidId = "vid-0";
  function toggleSearch() { let s = document.getElementById("vidSelect"); s.style.display = (s.style.display === "block") ? "none" : "block"; }
  function pauseAllVideos() { document.querySelectorAll("iframe").forEach(f => { if(f.src) f.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', "*"); }); }
  function playCurrentVideo() { let active = document.getElementById(currentActiveVidId); if(active) { let f = active.querySelector("iframe"); if(f && f.src) f.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', "*"); } }
  function handleNavigation(id) { if(!id) return; currentActiveVidId = id; pauseAllVideos(); document.getElementById(id).scrollIntoView({behavior:"smooth"}); let f = document.getElementById(id).querySelector("iframe"); if(f.src) { setTimeout(() => { f.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', "*"); }, 600); } }
  let observer = new IntersectionObserver(entries => { entries.forEach(e => { if(e.isIntersecting){ currentActiveVidId = e.target.id; let f = e.target.querySelector("iframe"); if(!f.src) f.src = f.dataset.src; } }); }, {threshold: 0.6});
  document.querySelectorAll(".yt-item").forEach(el => { observer.observe(el); });
</script>
